# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "8da1addef3dcd4251db5057cda3c85fa"
name = "Récit in.ink"
application_url = "https://shopify-app-250065525755.us-central1.run.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = [ "orders/fulfilled" ]
  uri = "/webhooks/orders_fulfilled"



[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# read_returns + write_returns: Phase 2 drives a native Shopify Return
# (returnableFulfillments query + returnCreate mutation) so the merchant's own
# Shopify Shipping issues the label, billed to them — ink stops fronting Shippo.
scopes = "read_assigned_fulfillment_orders,write_assigned_fulfillment_orders,read_customers,read_files,write_files,read_fulfillments,write_fulfillments,read_metaobjects,write_metaobjects,read_online_store_pages,write_online_store_pages,read_orders,write_orders,read_returns,write_returns,write_shipping,write_themes"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://shopify-app-250065525755.us-central1.run.app/auth/callback",
  "https://shopify-app-250065525755.us-central1.run.app/auth/shopify/callback"
]

# Checkout UI Extension for INK disclosure
[[extensions.paths]]
path = "extensions/ink-checkout-disclosure"
